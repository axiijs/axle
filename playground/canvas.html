<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axle Canvas Playground</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f1115;
        color: #e6e6e6;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid #23262d;
        flex-wrap: wrap;
      }
      header h1 {
        font-size: 16px;
        margin: 0 12px 0 0;
        font-weight: 600;
      }
      header h1 span {
        color: #7aa2ff;
      }
      header a {
        color: #8a919e;
        font-size: 12px;
        text-decoration: none;
      }
      header a:hover {
        color: #7aa2ff;
      }
      button {
        background: #1c2027;
        color: #e6e6e6;
        border: 1px solid #2c313a;
        border-radius: 6px;
        padding: 6px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover {
        background: #262b34;
        border-color: #3a4150;
      }
      .sep {
        width: 1px;
        height: 20px;
        background: #2c313a;
      }
      #zoom-level {
        min-width: 48px;
        text-align: center;
        font-size: 13px;
        color: #8a919e;
        font-variant-numeric: tabular-nums;
      }
      #canvas {
        flex: 1;
        min-height: 0;
      }
      .hint {
        font-size: 12px;
        color: #8a919e;
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <header>
      <h1><span>Axle</span> Canvas</h1>
      <button id="add-image">+ 图文卡片</button>
      <button id="add-video">+ 视频卡片</button>
      <div class="sep"></div>
      <button id="zoom-out">−</button>
      <span id="zoom-level">100%</span>
      <button id="zoom-in">＋</button>
      <button id="zoom-fit">适应内容</button>
      <button id="zoom-reset">100%</button>
      <span class="hint">
        点击 port 派生连线，再点另一张卡片的 port 完成 · 拖动卡片 · 空白处拖动/滚轮平移 ·
        Ctrl/⌘+滚轮或捏合缩放 · 点击连线选中后 Delete 删除 · Esc 取消连线 ·
        <a href="./index.html">← 基础 demo</a> ·
        <a href="./stress.html">10k+ 压测 →</a>
      </span>
    </header>
    <div id="canvas"></div>
    <script type="module" src="./canvas.tsx"></script>
  </body>
</html>
