name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run check
      - run: npm run test:coverage

  stress-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: npm
      - run: npm ci
      - name: Run 10k-card browser smoke test
        shell: bash
        run: |
          npm run playground -- --host 127.0.0.1 --port 5199 > /tmp/axle-vite.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:5199/stress.html > /dev/null; then
              break
            fi
            if [[ "$attempt" == 30 ]]; then
              cat /tmp/axle-vite.log
              exit 1
            fi
            sleep 1
          done
          export CHROME_PATH
          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium)"
          npm run smoke:stress
